version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    commit-message:
      prefix: chore(deps)
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - ci

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    commit-message:
      prefix: chore(deps)
    groups:
      docker:
        patterns:
          - "*"
    labels:
      - ci
