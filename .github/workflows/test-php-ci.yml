name: Test PHP CI Image

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.3', '8.2']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          platforms: linux/amd64
          tags: php-ci:test-${{ matrix.php-version }}
          build-args: |
            PHP_VERSION=${{ matrix.php-version }}
            IMAGE_VERSION=ci-${{ github.sha }}
            SOURCE_REPOSITORY=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha,scope=php-ci-test-${{ matrix.php-version }}
          cache-to: type=gha,mode=max,scope=php-ci-test-${{ matrix.php-version }}

      - name: Verify PHP extensions
        run: |
          IMAGE="php-ci:test-${{ matrix.php-version }}"
          docker run --rm "${IMAGE}" php -m | tee /tmp/php-modules.txt
          for ext in mysqli sodium pdo_mysql intl zip mbstring fileinfo json ctype tokenizer xml pdo; do
            docker run --rm "${IMAGE}" php -r "exit(extension_loaded('${ext}') ? 0 : 1);" \
              || { echo "Missing extension: ${ext}"; exit 1; }
          done
          grep -qi 'opcache' /tmp/php-modules.txt

      - name: Verify Composer
        run: |
          docker run --rm "php-ci:test-${{ matrix.php-version }}" composer --version

      - name: Verify CI utilities
        run: |
          IMAGE="php-ci:test-${{ matrix.php-version }}"
          docker run --rm "${IMAGE}" git --version
          docker run --rm "${IMAGE}" jq --version
          docker run --rm "${IMAGE}" test -d /builds

      - name: Smoke test Composer install
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/builds" \
            -w /builds \
            "php-ci:test-${{ matrix.php-version }}" \
            sh -c 'printf "%s\n" "{\"require\":{\"php\":\"*\"}}" > composer.json && composer install --no-interaction --no-progress'
