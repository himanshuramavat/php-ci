name: Test PHP CI Image

on:
  push:
    branches:
      - master
      - 'feature/*'
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.4', '8.3', '8.2', '8.1']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          platforms: linux/amd64
          tags: php-ci:test-${{ matrix.php-version }}
          build-args: |
            PHP_VERSION=${{ matrix.php-version }}
            IMAGE_VERSION=ci-${{ github.sha }}
            SOURCE_REPOSITORY=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha,scope=php-ci-test-${{ matrix.php-version }}
          cache-to: type=gha,mode=max,scope=php-ci-test-${{ matrix.php-version }}

      - name: Start PostgreSQL and Redis containers
        run: |
          docker run -d --name phpci-postgres --network host \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=postgres \
            postgres:16-alpine
          docker run -d --name phpci-redis --network host redis:7-alpine
          for i in $(seq 1 30); do
            docker run --rm --network host postgres:16-alpine pg_isready -h 127.0.0.1 -p 5432 -U postgres >/dev/null 2>&1 && break
            sleep 1
          done
          for i in $(seq 1 30); do
            docker run --rm --network host redis:7-alpine redis-cli -h 127.0.0.1 ping >/dev/null 2>&1 && break
            sleep 1
          done

      - name: Verify built image
        run: |
          IMAGE="php-ci:test-${{ matrix.php-version }}"
          docker run --rm "${IMAGE}" /usr/local/bin/verify-image.sh

      - name: Smoke test SQLite PDO (TYPO3 functional tests)
        run: |
          IMAGE="php-ci:test-${{ matrix.php-version }}"
          docker run --rm "${IMAGE}" php -r '
            $pdo = new PDO("sqlite::memory:");
            $pdo->exec("CREATE TABLE t (id INTEGER PRIMARY KEY)");
            $pdo->exec("INSERT INTO t (id) VALUES (1)");
            exit($pdo->query("SELECT COUNT(*) FROM t")->fetchColumn() == 1 ? 0 : 1);
          '

      - name: Smoke test PostgreSQL PDO
        run: |
          IMAGE="php-ci:test-${{ matrix.php-version }}"
          docker run --rm --network host "${IMAGE}" php -r '
            $pdo = new PDO("pgsql:host=127.0.0.1;port=5432;dbname=postgres","postgres","postgres");
            $pdo->exec("CREATE TABLE t (id SERIAL PRIMARY KEY)");
            $pdo->exec("INSERT INTO t (id) VALUES (1)");
            exit($pdo->query("SELECT COUNT(*) FROM t")->fetchColumn() == 1 ? 0 : 1);
          '

      - name: Smoke test Redis
        run: |
          IMAGE="php-ci:test-${{ matrix.php-version }}"
          docker run --rm --network host "${IMAGE}" php -r '
            $redis = new Redis();
            $redis->connect("127.0.0.1", 6379);
            $pong = $redis->ping();
            exit(in_array($pong, ["+PONG", "PONG"], true) ? 0 : 1);
          '

      - name: Verify Composer
        run: |
          docker run --rm "php-ci:test-${{ matrix.php-version }}" composer --version

      - name: Verify CI utilities
        run: |
          IMAGE="php-ci:test-${{ matrix.php-version }}"
          docker run --rm "${IMAGE}" git --version
          docker run --rm "${IMAGE}" jq --version
          docker run --rm "${IMAGE}" test -d /builds

      - name: Smoke test Composer install
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/builds" \
            -w /builds \
            "php-ci:test-${{ matrix.php-version }}" \
            sh -c 'printf "%s\n" "{\"require\":{\"php\":\"*\"}}" > composer.json && composer install --no-interaction --no-progress'

      - name: Stop PostgreSQL and Redis containers
        if: always()
        run: |
          docker rm -f phpci-postgres phpci-redis || true
