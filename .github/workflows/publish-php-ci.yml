name: Publish PHP CI Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      image_version:
        description: 'Semantic version embedded in tags (e.g. 1.1.0)'
        required: true
        default: '1.1.0'
      php_versions:
        # Add 8.5 once php:8.5-cli-bookworm is GA on Docker Hub.
        description: 'Comma-separated PHP minor versions to build (e.g. 8.4,8.3,8.2,8.1)'
        required: true
        default: '8.4,8.3,8.2,8.1'
      push_latest:
        description: 'Push :latest tag (only applied to the highest PHP version built)'
        type: boolean
        default: true

env:
  GHCR_IMAGE: ghcr.io/himanshuramavat/php-ci
  DOCKERHUB_IMAGE: docker.io/himanshuramavat/php-ci

permissions:
  contents: read
  packages: write
  id-token: write   # keyless cosign signing via GitHub OIDC

jobs:
  resolve-version:
    name: Resolve image version
    runs-on: ubuntu-latest
    outputs:
      image_version: ${{ steps.version.outputs.image_version }}
      php_matrix: ${{ steps.php.outputs.php_matrix }}
      push_latest: ${{ steps.latest.outputs.push_latest }}
      latest_php_version: ${{ steps.php.outputs.latest_php_version }}
    steps:
      - name: Resolve semantic version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "image_version=${{ github.event.inputs.image_version }}" >> "${GITHUB_OUTPUT}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "image_version=${GITHUB_REF#refs/tags/v}" >> "${GITHUB_OUTPUT}"
          else
            echo "ERROR: Publish workflow must be triggered by a v* tag or workflow_dispatch." >&2
            exit 1
          fi

      - name: Resolve PHP versions matrix
        id: php
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            versions="${{ github.event.inputs.php_versions }}"
          else
            versions="8.4,8.3,8.2,8.1"
          fi
          php_matrix="$(echo "${versions}" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | sort -rn | jq -R . | jq -s -c .)"
          latest_php_version="$(echo "${versions}" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | sort -rn | head -n1)"
          echo "php_matrix=${php_matrix}" >> "${GITHUB_OUTPUT}"
          echo "latest_php_version=${latest_php_version}" >> "${GITHUB_OUTPUT}"

      - name: Resolve push_latest flag
        id: latest
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "push_latest=${{ github.event.inputs.push_latest }}" >> "${GITHUB_OUTPUT}"
          else
            echo "push_latest=true" >> "${GITHUB_OUTPUT}"
          fi

  build-and-push:
    name: Build PHP ${{ matrix.php-version }}
    needs: resolve-version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ${{ fromJson(needs.resolve-version.outputs.php_matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=raw,value=${{ matrix.php-version }}
            type=raw,value=${{ matrix.php-version }}-v${{ needs.resolve-version.outputs.image_version }}
            type=raw,value=latest,enable=${{ needs.resolve-version.outputs.push_latest == 'true' && matrix.php-version == needs.resolve-version.outputs.latest_php_version }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: true
          sbom: true
          build-args: |
            PHP_VERSION=${{ matrix.php-version }}
            IMAGE_VERSION=${{ needs.resolve-version.outputs.image_version }}
            SOURCE_REPOSITORY=${{ github.server_url }}/${{ github.repository }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=php-ci-${{ matrix.php-version }}
          cache-to: type=gha,mode=max,scope=php-ci-${{ matrix.php-version }}

      - name: Sign pushed images (cosign keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          # Sign each image ref by immutable digest (covers GHCR + Docker Hub).
          for tag in ${TAGS}; do
            repo="${tag%%:*}"
            echo "Signing ${repo}@${DIGEST}"
            cosign sign --yes "${repo}@${DIGEST}"
          done

      - name: Scan published image for vulnerabilities (Trivy)
        uses: ./.github/actions/trivy-image-scan
        with:
          image-ref: ${{ env.GHCR_IMAGE }}:${{ matrix.php-version }}

      - name: Post-build smoke test (Docker Hub)
        run: |
          IMAGE="${{ env.DOCKERHUB_IMAGE }}:${{ matrix.php-version }}"
          docker pull "${IMAGE}"
          docker run --rm "${IMAGE}" php -m | grep -qi '^pdo_sqlite$'
          docker run --rm "${IMAGE}" php -m | grep -qi '^pdo_pgsql$'
          docker run --rm "${IMAGE}" php -m | grep -qi '^gd$'
          docker run --rm "${IMAGE}" php -m | grep -qi '^redis$'
          docker run --rm "${IMAGE}" composer --version
