name: Weekly Rebuild Rolling Tags

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

env:
  GHCR_IMAGE: ghcr.io/himanshuramavat/php-ci
  DOCKERHUB_IMAGE: docker.io/himanshuramavat/php-ci

permissions:
  contents: read
  packages: write

jobs:
  rebuild:
    name: Rebuild and push rolling PHP tags
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Uncomment '8.5' once php:8.5-cli-bookworm is GA on Docker Hub.
        php-version: [8.4, 8.3, 8.2, 8.1]  # , '8.5'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=raw,value=${{ matrix.php-version }}
            type=raw,value=latest,enable=${{ matrix.php-version == '8.4' }}

      - name: Build and push rolling image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            PHP_VERSION=${{ matrix.php-version }}
            IMAGE_VERSION=weekly-rebuild-${{ github.run_id }}
            SOURCE_REPOSITORY=${{ github.server_url }}/${{ github.repository }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=php-ci-weekly-rebuild-${{ matrix.php-version }}
          cache-to: type=gha,mode=max,scope=php-ci-weekly-rebuild-${{ matrix.php-version }}

      - name: Scan published image for vulnerabilities (Trivy)
        uses: ./.github/actions/trivy-image-scan
        with:
          image-ref: ${{ env.GHCR_IMAGE }}:${{ matrix.php-version }}

  rebuild-deploy:
    name: Rebuild and push rolling 8.4-deploy tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=raw,value=8.4-deploy

      - name: Build and push rolling deploy image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: deploy
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            PHP_VERSION=8.4
            IMAGE_VERSION=weekly-rebuild-${{ github.run_id }}
            SOURCE_REPOSITORY=${{ github.server_url }}/${{ github.repository }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=php-ci-weekly-rebuild-deploy-8.4
          cache-to: type=gha,mode=max,scope=php-ci-weekly-rebuild-deploy-8.4

      - name: Scan published deploy image for vulnerabilities (Trivy)
        uses: ./.github/actions/trivy-image-scan
        with:
          image-ref: ${{ env.GHCR_IMAGE }}:8.4-deploy
