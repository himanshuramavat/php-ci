name: Weekly Rebuild Rolling Tags

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

env:
  GHCR_IMAGE: ghcr.io/himanshuramavat/php-ci
  DOCKERHUB_IMAGE: docker.io/himanshuramavat/php-ci

permissions:
  contents: read
  packages: write

jobs:
  rebuild:
    name: Rebuild and push rolling PHP tags
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: [8.4, 8.3, 8.2, 8.1]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push rolling image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            PHP_VERSION=${{ matrix.php-version }}
            IMAGE_VERSION=weekly-rebuild-${{ github.run_id }}
            SOURCE_REPOSITORY=${{ github.server_url }}/${{ github.repository }}
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ matrix.php-version }}
            ${{ env.DOCKERHUB_IMAGE }}:${{ matrix.php-version }}
            type=raw,value=${{ env.GHCR_IMAGE }}:latest,enable=${{ matrix.php-version == '8.4' }}
            type=raw,value=${{ env.DOCKERHUB_IMAGE }}:latest,enable=${{ matrix.php-version == '8.4' }}
          cache-from: type=gha,scope=php-ci-weekly-rebuild-${{ matrix.php-version }}
          cache-to: type=gha,mode=max,scope=php-ci-weekly-rebuild-${{ matrix.php-version }}
